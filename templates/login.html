{% extends 'base.html' %}
{% block content %}
<h2>Вход</h2>

{% if form.errors %}
<div class="alert alert-danger">
    Неверный логин или пароль. Если вы только зарегистрировались — сначала подтвердите почту.
</div>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Войти</button>
</form>
<p class="mt-3">
    Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
</p>
{% endblock %}
