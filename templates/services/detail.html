{% extends 'base.html' %}
{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'services_list' %}">Услуги</a></li>
        <li class="breadcrumb-item active">{{ service.name }}</li>
    </ol>
</nav>

<div class="card">
    <div class="card-body">
        <span class="badge bg-secondary mb-2">{{ service.category.name }}</span>
        <h2>{{ service.name }}</h2>
        <p class="text-muted">Длительность: {{ service.duration }} минут</p>
        <p class="fs-4 fw-bold">{{ service.price }} ₽</p>
        {% if user.is_authenticated %}
        <a href="{% url 'booking_create' service.id %}" class="btn btn-primary btn-lg">Записаться</a>
        {% else %}
        <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Войти для записи</a>
        {% endif %}
    </div>
</div>
{% endblock %}
